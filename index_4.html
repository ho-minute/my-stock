<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>호두네 포트폴리오</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2a3a;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --accent: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --cyan: #06b6d4;
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.mono { font-family: 'JetBrains Mono', monospace; }

/* Loading */
#loading {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; transition: opacity 0.5s;
}
#loading.hide { opacity: 0; pointer-events: none; }
#loading .spinner {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { color: var(--text-dim); font-size: 14px; }

/* Header */
.header {
  padding: 20px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 {
  font-size: 22px; font-weight: 900;
  background: linear-gradient(135deg, var(--accent), #fbbf24);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header .update-time { font-size: 11px; color: var(--text-dim); }
.refresh-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-dim); padding: 6px 12px; border-radius: 8px;
  font-size: 12px; cursor: pointer; transition: all 0.2s;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Summary Cards */
.summary-grid {
  display: grid; grid-template-columns: 1fr;
  gap: 12px; padding: 0 16px 16px;
}
.total-card {
  background: linear-gradient(135deg, #1a1f35, #0f1729);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  position: relative; overflow: hidden;
}
.total-card::before {
  content: ''; position: absolute; top: -50%; right: -30%;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(245,158,11,0.08), transparent 70%);
  border-radius: 50%;
}
.total-card .label { font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.total-card .amount { font-size: 32px; font-weight: 900; letter-spacing: -1px; }
.total-card .pnl { font-size: 15px; margin-top: 6px; font-weight: 600; }

.account-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 16px; }
.account-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; text-align: center;
}
.account-card .name { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.account-card .value { font-size: 16px; font-weight: 700; }
.account-card .pnl { font-size: 11px; margin-top: 4px; }

/* Tabs */
.tabs {
  display: flex; gap: 0; padding: 0 16px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab {
  padding: 10px 16px; font-size: 13px; font-weight: 600;
  color: var(--text-dim); background: none; border: none;
  cursor: pointer; white-space: nowrap; position: relative;
  transition: color 0.2s;
}
.tab.active { color: var(--accent); }
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}

.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* Holdings Table */
.filter-bar {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px; font-size: 12px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 20px; cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

.holdings-list { display: flex; flex-direction: column; gap: 8px; }
.holding-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  display: grid; grid-template-columns: 1fr auto; gap: 4px;
  transition: border-color 0.2s;
}
.holding-item:hover { border-color: var(--accent); }
.holding-item .name { font-weight: 600; font-size: 14px; }
.holding-item .meta { font-size: 11px; color: var(--text-dim); }
.holding-item .value { text-align: right; font-weight: 700; font-size: 15px; }
.holding-item .pnl { text-align: right; font-size: 12px; font-weight: 600; }

/* Charts */
.chart-section { margin-bottom: 24px; }
.chart-title {
  font-size: 15px; font-weight: 700; margin-bottom: 12px;
  padding-left: 4px;
}
.chart-container {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  position: relative;
}
.chart-container canvas { max-height: 280px; }

/* Tax */
.tax-list { display: flex; flex-direction: column; gap: 8px; }
.tax-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.tax-item .info { flex: 1; }
.tax-item .name { font-weight: 600; font-size: 14px; }
.tax-item .detail { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.tax-badge {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;
}
.tax-badge.long { background: rgba(16,185,129,0.15); color: var(--green); }
.tax-badge.short { background: rgba(239,68,68,0.15); color: var(--red); }
.tax-badge.none { background: rgba(100,116,139,0.15); color: var(--text-dim); }

/* Error */
.error-msg {
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
  border-radius: 12px; padding: 20px; text-align: center; color: var(--red);
}

.positive { color: var(--green); }
.negative { color: var(--red); }

/* Responsive */
@media (min-width: 640px) {
  .summary-grid { grid-template-columns: 1fr; }
  .account-cards { grid-template-columns: repeat(3, 1fr); }
  body { max-width: 480px; margin: 0 auto; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>포트폴리오 불러오는 중...</p>
</div>

<div id="app" style="opacity:0; transition: opacity 0.4s;">
  <!-- Header -->
  <div class="header">
    <div>
      <h1>🥜 호두네 포트폴리오</h1>
      <div class="update-time" id="updateTime"></div>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
  </div>

  <!-- Summary -->
  <div class="summary-grid">
    <div class="total-card">
      <div class="label">총 자산</div>
      <div class="amount mono" id="totalValue">-</div>
      <div class="pnl" id="totalPnl">-</div>
    </div>
  </div>

  <div class="account-cards" id="accountCards"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="holdings">보유현황</button>
    <button class="tab" data-tab="charts">비중 차트</button>
    <button class="tab" data-tab="monthly">수익률 추이</button>
    <button class="tab" data-tab="tax">세금 추적</button>
  </div>

  <!-- Tab: Holdings -->
  <div class="tab-content active" id="tab-holdings">
    <div class="filter-bar" id="filterBar"></div>
    <div class="holdings-list" id="holdingsList"></div>
  </div>

  <!-- Tab: Charts -->
  <div class="tab-content" id="tab-charts">
    <div class="chart-section">
      <div class="chart-title">자산유형별 비중</div>
      <div class="chart-container"><canvas id="assetChart"></canvas></div>
    </div>
    <div class="chart-section">
      <div class="chart-title">섹터별 비중</div>
      <div class="chart-container"><canvas id="sectorChart"></canvas></div>
    </div>
    <div class="chart-section">
      <div class="chart-title">계좌별 비중</div>
      <div class="chart-container"><canvas id="accountChart"></canvas></div>
    </div>
  </div>

  <!-- Tab: Monthly -->
  <div class="tab-content" id="tab-monthly">
    <div class="chart-section">
      <div class="chart-title">월별 총 자산 추이</div>
      <div class="chart-container"><canvas id="monthlyChart"></canvas></div>
    </div>
    <div class="chart-section">
      <div class="chart-title">계좌별 월별 추이</div>
      <div class="chart-container"><canvas id="monthlyDetailChart"></canvas></div>
    </div>
    <div id="monthlyNote" style="text-align:center; color:var(--text-dim); font-size:12px; margin-top:8px;"></div>
  </div>

  <!-- Tab: Tax -->
  <div class="tab-content" id="tab-tax">
    <div class="tax-list" id="taxList"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwq_oNR3P74ciXAH4OGy7e1uFKrdOHI6roMmw47GUngoxzsurzWsF1s8kR-WKLQN7hg/exec';

let DATA = {};
let charts = {};

// ── Tabs ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Load Data ──
async function loadData() {
  try {
    const res = await fetch(API_URL + '?action=all');
    DATA = await res.json();
    renderAll();
    document.getElementById('loading').classList.add('hide');
    document.getElementById('app').style.opacity = '1';
  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<div class="error-msg">데이터를 불러올 수 없습니다.<br><br>' +
      '<small>' + err.message + '</small><br><br>' +
      '<button class="refresh-btn" onclick="loadData()">다시 시도</button></div>';
  }
}

function renderAll() {
  renderSummary();
  renderHoldings();
  renderCharts();
  renderMonthly();
  renderTax();
}

// ── Summary ──
function renderSummary() {
  const s = DATA.summary;
  if (!s) return;

  document.getElementById('totalValue').textContent = fmt$(s.grandTotal);
  const pnlEl = document.getElementById('totalPnl');
  pnlEl.textContent = `${s.grandPnl >= 0 ? '+' : ''}${fmt$(s.grandPnl)} (${s.grandReturnPct >= 0 ? '+' : ''}${s.grandReturnPct}%)`;
  pnlEl.className = 'pnl ' + (s.grandPnl >= 0 ? 'positive' : 'negative');

  document.getElementById('updateTime').textContent = '업데이트: ' + (s.updatedAt || '-');

  const acctHtml = Object.entries(s.accounts).map(([name, d]) => `
    <div class="account-card">
      <div class="name">${shortAcct(name)}</div>
      <div class="value mono">${fmt$Short(d.totalValue)}</div>
      <div class="pnl ${d.totalPnl >= 0 ? 'positive' : 'negative'}">
        ${d.totalPnl >= 0 ? '+' : ''}${fmt$Short(d.totalPnl)} (${d.returnPct >= 0 ? '+' : ''}${d.returnPct}%)
      </div>
    </div>
  `).join('');
  document.getElementById('accountCards').innerHTML = acctHtml;
}

// ── Holdings ──
let currentFilter = '전체';

function renderHoldings() {
  const h = DATA.holdings;
  if (!h || !h.holdings) return;

  const accounts = ['전체', ...new Set(h.holdings.map(x => x.account))];
  const filterHtml = accounts.map(a => `
    <button class="filter-btn ${a === currentFilter ? 'active' : ''}" onclick="filterHoldings('${a}')">${shortAcct(a)}</button>
  `).join('');
  document.getElementById('filterBar').innerHTML = filterHtml;

  const filtered = currentFilter === '전체' ? h.holdings : h.holdings.filter(x => x.account === currentFilter);
  const sorted = [...filtered].sort((a, b) => (b.value || 0) - (a.value || 0));

  const listHtml = sorted.map(item => `
    <div class="holding-item">
      <div>
        <div class="name">${item.name}</div>
        <div class="meta">${item.ticker || ''} · ${item.qty}주 · ${shortAcct(item.account)}</div>
      </div>
      <div>
        <div class="value mono">${fmt$(item.value)}</div>
        <div class="pnl ${(item.pnl || 0) >= 0 ? 'positive' : 'negative'}">
          ${item.pnl >= 0 ? '+' : ''}${fmt$(item.pnl)} (${fmtPct(item.returnPct)})
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('holdingsList').innerHTML = listHtml || '<div style="text-align:center;color:var(--text-dim);padding:20px;">데이터 없음</div>';
}

function filterHoldings(acct) {
  currentFilter = acct;
  renderHoldings();
}

// ── Charts ──
const COLORS = ['#f59e0b','#3b82f6','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899','#84cc16','#6366f1',
  '#14b8a6','#e11d48','#a855f7','#22d3ee','#fb923c','#4ade80','#c084fc','#fbbf24','#38bdf8'];

function renderCharts() {
  const s = DATA.sectors;
  if (!s) return;

  // Asset Type Donut
  if (charts.asset) charts.asset.destroy();
  charts.asset = new Chart(document.getElementById('assetChart'), {
    type: 'doughnut',
    data: {
      labels: s.byAssetType.map(x => x.category),
      datasets: [{ data: s.byAssetType.map(x => x.value), backgroundColor: COLORS.slice(0, s.byAssetType.length), borderWidth: 0 }]
    },
    options: doughnutOpts()
  });

  // Sector Donut
  const sectorData = s.bySector.filter(x => x.value > 0).sort((a, b) => b.value - a.value);
  if (charts.sector) charts.sector.destroy();
  charts.sector = new Chart(document.getElementById('sectorChart'), {
    type: 'doughnut',
    data: {
      labels: sectorData.map(x => x.category),
      datasets: [{ data: sectorData.map(x => x.value), backgroundColor: COLORS.slice(0, sectorData.length), borderWidth: 0 }]
    },
    options: doughnutOpts()
  });

  // Account Bar
  if (charts.account) charts.account.destroy();
  charts.account = new Chart(document.getElementById('accountChart'), {
    type: 'bar',
    data: {
      labels: s.byAccount.map(x => shortAcct(x.category)),
      datasets: [{
        data: s.byAccount.map(x => x.value),
        backgroundColor: ['#f59e0b', '#3b82f6', '#8b5cf6'],
        borderRadius: 8, borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => fmt$(ctx.parsed.y) } }
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', callback: v => '$' + (v/1000).toFixed(0) + 'k' }, grid: { color: '#1e2a3a' } }
      }
    }
  });
}

function doughnutOpts() {
  return {
    responsive: true, maintainAspectRatio: true,
    cutout: '55%',
    plugins: {
      legend: { position: 'right', labels: { color: '#e2e8f0', font: { size: 11 }, padding: 8, usePointStyle: true, pointStyleWidth: 8 } },
      tooltip: { callbacks: { label: ctx => `${ctx.label}: ${fmt$(ctx.parsed)} (${((ctx.parsed/ctx.dataset.data.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)` } }
    }
  };
}

// ── Monthly ──
function renderMonthly() {
  const m = DATA.monthly;
  if (!m || !m.records || m.records.length === 0) {
    document.getElementById('monthlyNote').textContent = '월별 데이터가 아직 없습니다. 매월 1일에 자동 기록됩니다.';
    return;
  }

  const labels = m.records.map(r => r.date);
  const totals = m.records.map(r => r.total);

  if (charts.monthly) charts.monthly.destroy();
  charts.monthly = new Chart(document.getElementById('monthlyChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '총 자산',
        data: totals,
        borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.1)',
        fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#f59e0b',
        borderWidth: 2
      }]
    },
    options: lineOpts()
  });

  if (charts.monthlyDetail) charts.monthlyDetail.destroy();
  charts.monthlyDetail = new Chart(document.getElementById('monthlyDetailChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '키움-호두', data: m.records.map(r => r.kiwoom), borderColor: '#f59e0b', tension: 0.3, pointRadius: 3, borderWidth: 2 },
        { label: 'Webull-호두', data: m.records.map(r => r.webullHodu), borderColor: '#3b82f6', tension: 0.3, pointRadius: 3, borderWidth: 2 },
        { label: 'Webull-새롬', data: m.records.map(r => r.webullSaerom), borderColor: '#8b5cf6', tension: 0.3, pointRadius: 3, borderWidth: 2 }
      ]
    },
    options: lineOpts()
  });
}

function lineOpts() {
  return {
    responsive: true, maintainAspectRatio: true,
    plugins: {
      legend: { labels: { color: '#e2e8f0', font: { size: 11 }, usePointStyle: true } },
      tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt$(ctx.parsed.y)}` } }
    },
    scales: {
      x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2a3a' } },
      y: { ticks: { color: '#64748b', callback: v => '$' + (v/1000).toFixed(0) + 'k' }, grid: { color: '#1e2a3a' } }
    }
  };
}

// ── Tax ──
function renderTax() {
  const h = DATA.holdings;
  if (!h || !h.holdings) return;

  const items = h.holdings.filter(x => x.buyDate || x.holdingType);
  if (items.length === 0) {
    document.getElementById('taxList').innerHTML =
      '<div style="text-align:center;color:var(--text-dim);padding:30px;">매수일(L열)을 입력하면 장기보유 여부가 표시됩니다.</div>';
    return;
  }

  const html = items.map(item => {
    const badge = item.holdingType === '장기' ? 'long' : item.holdingType === '단기' ? 'short' : 'none';
    const label = item.holdingType || '미입력';
    const days = item.buyDate ? Math.floor((Date.now() - new Date(item.buyDate)) / 86400000) : null;

    return `
      <div class="tax-item">
        <div class="info">
          <div class="name">${item.name}</div>
          <div class="detail">${item.account} · ${item.buyDate || '매수일 미입력'}${days !== null ? ' · ' + days + '일' : ''}</div>
        </div>
        <span class="tax-badge ${badge}">${label}</span>
      </div>
    `;
  }).join('');
  document.getElementById('taxList').innerHTML = html;
}

// ── Helpers ──
function fmt$(n) {
  if (n == null || isNaN(n)) return '-';
  return '$' + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmt$Short(n) {
  if (n == null || isNaN(n)) return '-';
  if (Math.abs(n) >= 1000) return '$' + (n / 1000).toFixed(1) + 'k';
  return '$' + n.toFixed(0);
}

function fmtPct(n) {
  if (n == null || isNaN(n)) return '-';
  return (n >= 0 ? '+' : '') + (n * 100).toFixed(1) + '%';
}

function shortAcct(name) {
  const map = { '키움-호두': '키움', 'Webull-호두': 'WB-호두', 'Webull-새롬': 'WB-새롬', '전체': '전체' };
  return map[name] || name;
}

// ── Init ──
loadData();
</script>
</body>
</html>
